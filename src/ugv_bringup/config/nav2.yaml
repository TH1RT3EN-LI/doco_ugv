bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    min_x_velocity_threshold: 0.005
    min_y_velocity_threshold: 0.005
    min_theta_velocity_threshold: 0.003
    odom_topic: /ugv/odometry/filtered
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.02
      movement_time_allowance: 30.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.06

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 24
      model_dt: 0.067
      batch_size: 1000
      vx_std: 0.12
      vy_std: 0.12
      wz_std: 0.30
      vx_max: 0.28
      vx_min: -0.28
      vy_max: 0.28
      wz_max: 0.75
      ax_max: 1.8
      ax_min: -1.8
      ay_max: 1.8
      az_max: 2.2
      iteration_count: 1
      prune_distance: 1.2
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni"
      visualize: false
      reset_period: 1.0
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      critics:
        - ConstraintCritic
        - CostCritic
        - ObstaclesCritic
        - GoalCritic
        - GoalAngleCritic
        - PathAlignCritic
        - PathFollowCritic
        - PathAngleCritic
        - TwirlingCritic
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        threshold_to_consider: 0.5
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        threshold_to_consider: 0.3
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        critical_cost: 250.0
        near_collision_cost: 220.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 0.4
        inflation_layer_name: "inflation_layer"
        trajectory_point_step: 2
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        consider_footprint: true
        critical_weight: 45.0
        repulsion_weight: 1.8
        collision_cost: 1000000.0
        collision_margin_distance: 0.03
        near_goal_distance: 0.4
        cost_scaling_factor: 8.0
        inflation_radius: 0.22
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.5
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        offset_from_furthest: 5
        threshold_to_consider: 0.8
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 2
      TwirlingCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.5

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0
      publish_frequency: 8.0
      global_frame: ugv_odom
      robot_base_frame: ugv_base_footprint
      use_sim_time: false
      rolling_window: true
      width: 2
      height: 2
      resolution: 0.01
      footprint: "[[0.21, 0.21], [0.21, -0.21], [-0.21, -0.21], [-0.21, 0.21]]"
      footprint_padding: 0.005
      transform_tolerance: 0.25
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 8.0
        inflation_radius: 0.22
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: scan
        scan:
          topic: /ugv/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.15
          obstacle_max_range: 2.5
          obstacle_min_range: 0.15
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 3.0
      publish_frequency: 1.5
      global_frame: ugv_map
      robot_base_frame: ugv_base_footprint
      use_sim_time: false
      footprint: "[[0.21, 0.21], [0.21, -0.21], [-0.21, -0.21], [-0.21, 0.21]]"
      footprint_padding: 0.005
      transform_tolerance: 0.30
      resolution: 0.02
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: scan
        scan:
          topic: /ugv/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.15
          obstacle_max_range: 2.5
          obstacle_min_range: 0.15
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 12.0
        inflation_radius: 0.22
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    frame_id: "ugv_map"
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerLattice"
      tolerance: 0.04
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1500
      max_planning_time: 3.0
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      analytic_expansion_max_cost: 200.0
      analytic_expansion_max_cost_override: false
      reverse_penalty: 1.0
      change_penalty: 0.06
      non_straight_penalty: 1.15
      cost_penalty: 2.2
      rotation_penalty: 2.0
      retrospective_penalty: 0.015
      lattice_filepath: "__LATTICE_FILEPATH__"
      cache_obstacle_heuristic: false
      allow_reverse_expansion: true
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: ugv_odom
    robot_base_frame: ugv_base_footprint
    transform_tolerance: 0.2
    use_sim_time: false
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.5
    min_rotational_vel: 0.15
    rotational_acc_lim: 3.0

robot_state_publisher:
  ros__parameters:
    use_sim_time: false

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 15.0
    scale_velocities: false
    feedback: "CLOSED_LOOP"
    max_velocity: [0.28, 0.28, 0.75]
    min_velocity: [-0.28, -0.28, -0.75]
    max_accel: [1.8, 1.8, 2.2]
    max_decel: [-1.8, -1.8, -2.2]
    odom_topic: "/ugv/odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.005, 0.005, 0.003]
    velocity_timeout: 0.25
