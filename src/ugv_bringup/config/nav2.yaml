    use_sim_time: false
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.1
    alpha4: 0.1
    alpha5: 0.1
    base_frame_id: "ugv_base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "ugv_map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 8.0
    laser_min_range: 0.15
    laser_model_type: "likelihood_field"
    max_beams: 180
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "ugv_odom"
    pf_err: 0.02
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 2
    robot_model_type: "nav2_amcl::OmniMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 0.40
    update_min_a: 0.03
    update_min_d: 0.03
    z_hit: 0.85
    z_max: 0.05
    z_rand: 0.15
    z_short: 0.05
